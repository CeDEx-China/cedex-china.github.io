- name: Summer School in Mathematical Economics and Financial Econometrics
  audience: Students in Economics, Finance, and related disciplines pursuing advanced study or careers in economics and finance.
  description: Intensive training in analytical and quantitative foundations for economic modelling and financial econometrics.
  link: https://www.nottingham.edu.cn/en/humanities-and-social-sciences/schools-and-department/economics/research/research-centres/cedex-china/summer-school/summer-school-mefe.aspx

- name: Summer School in Applied Economics - Methods and Data
  audience: Students who want stronger empirical skills and hands-on experience with economic data and methodologies.
  description: Practical methods-focused training with applied projects and data-driven problem solving.
  link: https://www.nottingham.edu.cn/en/humanities-and-social-sciences/schools-and-department/economics/research/research-centres/cedex-china/summer-school/summer-school-aemd.aspx
