lang: en
title: CeDEx China
description: Centre for Decision Research and Experimental Economics (China)
url: "https://cedex-china.github.io"
baseurl: ""
email: CedexChina@nottingham.edu.cn
timezone: Asia/Shanghai
markdown: kramdown
permalink: pretty

remote_theme: alshedivat/al-folio

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-scholar
  - jekyll-socials

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      type: pages
    values:
      layout: page

include:
  - _pages

exclude:
  - vendor
  - node_modules

# Third-party libraries (CDN URLs for al-folio theme)
third_party_libraries:
  jquery:
    integrity:
      js: "sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
    url:
      js: "https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"
  mdb:
    integrity:
      css: "sha256-jpjYvU3G3N6nrrBwXJoVEYI/0zw8htfFnhT9ljN3JJw="
      js: "sha256-NdbiivsvWt7VYCt6hYNT3h/th9vSTL4EDWeGs5SN3DA="
    url:
      css: "https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/css/mdb.min.css"
      js: "https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/js/mdb.min.js"
  google_fonts:
    url:
      fonts: "https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:100,300,400,500,700|Material+Icons&display=swap"
